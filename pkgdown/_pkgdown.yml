url: https://andrewallenbruce.github.io/provider/

template:
  bootstrap: 5
  theme: tango
  light-switch: true
  bslib:
    base_font: {google: "Inter"}
    heading_font: {google: "Recursive"}
    code_font: {google: "JetBrains Mono"}
  includes:
    after_body: >
      <script data-goatcounter="https://andrewallenbruce.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>

home:
  title: provider • Tidy Healthcare Provider API Interface
  description: >
    Tools for accessing and retrieving healthcare provider data.
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:
    - intro
    - reference
    - articles
    right:
    - search
    - news
    - links
    - lightswitch
  components:
    search:
      search: []
    lightswitch:
      icon: fa-sun
      aria-label: Light switch
      id: lightswitch
      menu:
      - text: Light
        theme: light
        icon: fa-sun
      - text: Dark
        theme: dark
        icon: fa-moon
      - text: Auto
        theme: auto
        icon: fa-adjust
    intro:
      icon: ~
      href: articles/provider.html
      aria-label: Intro
      text: Getting started
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      menu:
      - text: Linking Providers
        href: articles/linking-providers.html
    news:
      icon: far fa-newspaper fa-lg
      href: news/index.html
      aria-label: News
      title: "Changelog"
      text: ""
    links:
      icon: fas fa-at
      aria-label: Links
      id: links
      menu:
      - text: GitHub
        icon: fab fa-github fa-lg
        href: https://github.com/andrewallenbruce/provider
      - text: Bluesky
        icon: fab fa-bluesky fa-lg
        href: http://twitter.com/andrewallbruce
      - text: LinkedIn
        icon: fas fa-linkedin fa-lg
        href: https://www.linkedin.com/in/andrewallenbruce

reference:
- title: Endpoints
  contents:
  - ambulatory
  - affiliations
  - clia
  - clinician
  - dialysis
  - facility
  - hospital
  - long_term
  - inpatient
  - outpatient
  - nppes
  - opted_out
  - order_refer
  - owner
  - pending
  - providers
  - quality
  - reassigned
  - revoked
  - transparency
  - utilization
  - modifier
